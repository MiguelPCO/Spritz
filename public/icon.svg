  <!-- Spray dots -->
  <circle cx="334" cy="110" r="7" fill="white" opacity="0.8"/>
  <circle cx="352" cy="128" r="5" fill="white" opacity="0.55"/>
  <circle cx="346" cy="96" r="4" fill="white" opacity="0.4"/>
  <circle cx="366" cy="112" r="3" fill="white" opacity="0.3"/>
