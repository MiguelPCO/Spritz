<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#E85D3A"/>
  <!-- Bottle body -->
  <rect x="168" y="200" width="176" height="216" rx="28" fill="white"/>
  <!-- Bottle neck -->
  <rect x="224" y="148" width="64" height="56" rx="8" fill="white"/>
  <!-- Bottle cap -->
